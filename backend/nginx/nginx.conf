# ============================================================================
# Precision RBI — nginx (TLS termination + routing + WebSocket upgrade)
# ============================================================================

worker_processes auto;
events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # stdout logging
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting (exempt /render/* — streaming is long-lived).
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/m;

    # WebSocket upgrade map.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstreams.
    upstream session_broker { server session-broker:3001; }
    upstream admin_console  { server admin-console:3000; }
    upstream render_gateway { server render-gateway:3003; }
    upstream bdr_service    { server bdr-service:3002; }

    # Gzip static assets only (NOT binary frame streams).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # ---- HTTP :80 → redirect to HTTPS -------------------------------------
    server {
        listen 80;
        server_name _;
        location / { return 301 https://$host$request_uri; }
    }

    # ---- HTTPS :443 -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # CORS for the Chrome extension origin (chrome-extension://*).
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;

        # ---- /render/* → render-gateway (WebSocket, low latency) ----------
        location /render/ {
            proxy_pass http://render_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;

            proxy_buffering    off;          # critical for low-latency frames
            proxy_read_timeout 3600s;        # keep WS alive for long sessions
            proxy_send_timeout 3600s;
            # NOT rate-limited.
        }

        # ---- /api/bdr-event → bdr-service ---------------------------------
        location = /api/bdr-event {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://bdr_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location = /api/bdr-events {
            proxy_pass http://bdr_service;
            proxy_set_header Host $host;
        }
        location = /api/bdr-flagged {
            proxy_pass http://bdr_service;
            proxy_set_header Host $host;
        }

        # ---- /api/whitelist → bdr-service (extension reads admin list) -----
        location = /api/whitelist {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://bdr_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- /api/* → session-broker --------------------------------------
        location /api/ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass http://session_broker;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 120s;
        }

        # ---- /admin/* → admin-console -------------------------------------
        location /admin/ {
            rewrite ^/admin/(.*)$ /$1 break;
            proxy_pass http://admin_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            return 200 'Precision RBI gateway. Use the Chrome extension.';
            add_header Content-Type text/plain;
        }
    }
}
