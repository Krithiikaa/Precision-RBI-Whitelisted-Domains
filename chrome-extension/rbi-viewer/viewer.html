<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precision RBI — Isolated Session</title>
  <style>
    /* ── Brand fonts (local woff2, air-gap compliant) ────────────────────── */
    @font-face {
      font-family: 'Montserrat';
      src: url('../fonts/Montserrat.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }
    @font-face {
      font-family: 'Libre Franklin';
      src: url('../fonts/LibreFranklin.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    :root {
      --obsidian: #0a0c0a;
      --green: #7AC943;
      --green-dim: #8adb53;
      --text: #f0f1f1;
      --text-dim: #a8b0a4;
      --danger: #ff6b4a;
      --warning: #e8a83a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Libre Franklin', system-ui, sans-serif;
      color: var(--text);
    }

    /* ── Top bar (32px) ──────────────────────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      background: var(--obsidian);
      border-bottom: 1px solid rgba(122, 201, 67, 0.28);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 12px;
      font-size: 12px;
      z-index: 10;
      user-select: none;
    }
    #topbar .brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.2px;
    }
    #topbar .lock { font-size: 13px; }
    #topbar .domain {
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      font-weight: 600;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #topbar .spacer { flex: 1; }
    #topbar .metric {
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      min-width: 64px;
    }
    #topbar .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 8px;
      border: 1px solid transparent;
    }
    #topbar .pill.canvas { color: var(--green); border-color: rgba(122,201,67,.5); }
    #topbar .pill.webrtc { color: #7fb0ff; border-color: rgba(127,176,255,.5); }
    #topbar button {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--danger);
      border-radius: 4px;
      padding: 3px 12px;
      cursor: pointer;
      transition: all 150ms ease;
    }
    #topbar button:hover { background: var(--danger); color: #1a0a05; }

    /* ── Stage / canvas ──────────────────────────────────────────────────── */
    #stage {
      position: fixed;
      top: 32px; left: 0; right: 0; bottom: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #screen {
      width: 100%;
      height: 100%;
      background: #000;
      cursor: crosshair;
      display: block;
      outline: none;
    }
    /* Hidden video sink used only in WebRTC upgrade path. */
    #remoteVideo { display: none; }

    /* ── Overlay (loading / reconnect / error) ───────────────────────────── */
    #overlay {
      position: fixed;
      inset: 32px 0 0 0;
      background: radial-gradient(900px 500px at 50% 0%, #11160f 0%, var(--obsidian) 65%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 8;
      transition: opacity 150ms ease;
    }
    #overlay.hidden { display: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(122, 201, 67, 0.18);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay .ov-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: var(--text);
    }
    #overlay .ov-sub { font-size: 13px; color: var(--text-dim); }
    #overlay .ov-countdown { font-size: 12px; color: var(--warning); }
  </style>
</head>
<body>
  <div id="topbar">
    <span class="lock">🔒</span>
    <span class="brand">Precision RBI</span>
    <span class="domain" id="domain">—</span>
    <span class="pill canvas" id="modePill">Canvas</span>
    <span class="spacer"></span>
    <span class="metric" id="timer">00:00:00</span>
    <span class="metric" id="fps">-- fps</span>
    <span class="metric" id="latency">-- ms</span>
    <button id="disconnectBtn">Disconnect</button>
  </div>

  <div id="stage">
    <canvas id="screen" tabindex="0"></canvas>
    <video id="remoteVideo" autoplay playsinline muted></video>
  </div>

  <div id="overlay">
    <div class="spinner"></div>
    <div class="ov-title" id="ovTitle">Connecting to isolated session…</div>
    <div class="ov-sub" id="ovSub">Establishing secure pixel stream</div>
    <div class="ov-countdown" id="ovCountdown"></div>
  </div>

  <script src="../content/watermark.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
